%YAML:1.0

File.version: "1.0"

Camera.type: "PinHole"

Camera1.fx: 1391.1306374888527
Camera1.fy: 1391.492450755347
Camera1.cx: 969.4650172880657
Camera1.cy: 547.1097462148103
Camera1.k1: 0.2664012384766079
Camera1.k2: -1.3321338096977156
Camera1.p1: -0.0011194207481915015
Camera1.p2: 0.0019406324021388362
Camera1.k3: 2.0937598567395765

Camera.width: 1920
